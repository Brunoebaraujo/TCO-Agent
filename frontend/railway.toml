# =============================================================
# Railway — configuração do serviço FRONTEND
# Este arquivo deve ficar dentro de /frontend
# No painel Railway, configure este serviço com Root Directory = frontend
# =============================================================

[build]
builder = "nixpacks"
buildCommand = "npm install && npm run build"

[deploy]
startCommand = "npx serve dist --listen $PORT --single"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
